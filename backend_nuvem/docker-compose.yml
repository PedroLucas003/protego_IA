services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: protego_mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt_broker/config:/mosquitto/config
      - ./mqtt_broker/data:/mosquitto/data
      - ./mqtt_broker/log:/mosquitto/log
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: protego_postgres
    environment:
      POSTGRES_DB: protego_db
      POSTGRES_USER: protego_user
      POSTGRES_PASSWORD: protego_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  fastapi:
    build: .
    container_name: protego_fastapi
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://protego_user:protego_pass@postgres:5432/protego_db
    ports:
      - "8000:8000"
    restart: unless-stopped

  emqx:
    image: emqx/emqx:latest
    container_name: protego_emqx
    depends_on:
      - postgres
    environment:
      EMQX_NAME: protego_emqx
      EMQX_HOST: 127.0.0.1
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: public
    ports:
      - "1884:1883"
      - "18083:18083"
    restart: unless-stopped

volumes:
  postgres_data: